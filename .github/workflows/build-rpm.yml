name: Build RPM

on:
  pull_request:
  workflow_dispatch:

jobs:
  build-rpm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build RPM
        run: |
          mkdir -p build
          buildah build \
            --volume "$PWD/build:/root/rpmbuild/RPMS:rw" \
            --tag fedoratricks-build:$(date +%s) .

      - name: Upload RPMs
        uses: actions/upload-artifact@v4
        with:
          name: fedoratricks-rpm
          path: build/*/*.rpm
